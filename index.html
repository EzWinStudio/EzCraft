<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EzCraft</title>
    <!-- Modern Yazı Tipi -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome İkonları -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        /* Yavaş Hareket Eden Siyah/Koyu Gri Animasyonlu Arka Plan */
        body {
            background: linear-gradient(120deg, #050505, #111111, #0a0a0a, #1a1a1a);
            background-size: 300% 300%;
            animation: slowPan 15s ease-in-out infinite alternate;
            color: #ffffff;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes slowPan {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* NAVİGASYON VE LOGO */
        nav {
            width: 100%;
            padding: 50px 60px;
            display: flex;
            align-items: center;
            position: relative;
        }
        .logo {
            position: absolute;
            left: 60px;
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #ffffff;
            text-transform: uppercase;
        }
        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
            color: #eaeaea;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            margin: 0 auto; /* Linkleri tam ortaya hizalar */
        }
        .nav-links li {
            cursor: pointer;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .nav-links li:hover { color: #ffffff; }
        .nav-dot { color: #555; font-size: 1.2rem; }

        /* IP BÖLÜMÜ */
        .hero-section {
            margin-top: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .hero-text {
            font-size: 1.1rem;
            font-weight: 400;
            color: #f0f0f0;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }
        .ip-box {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 16px 45px;
            font-size: 1.2rem;
            font-weight: 400;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        .ip-box:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* SIKÇA SORULANLAR */
        .faq-section {
            margin-top: 100px;
            width: 100%;
            max-width: 800px;
            padding: 0 20px;
        }
        .faq-section h2 {
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 3px;
            margin-bottom: 50px;
            color: #ffffff;
        }
        .faq-item {
            padding: 25px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .faq-item:hover {
            opacity: 0.8;
        }
        .faq-question {
            font-size: 1.15rem;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: 0.5px;
        }
        .faq-item i {
            font-size: 1.2rem;
            font-weight: 300;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- Menü ve Sol Üst Logo -->
    <nav>
        <div class="logo">EzCraft</div>
        <ul class="nav-links">
            <li><span class="nav-dot">&bull;</span> ANA SAYFA</li>
            <li><span class="nav-dot">&bull;</span> MAĞAZA</li>
            <li><span class="nav-dot">&bull;</span> BLOG</li>
            <li><span class="nav-dot">&bull;</span> WIKI</li>
        </ul>
    </nav>

    <!-- Yazı ve IP Adresi -->
    <div class="hero-section">
        <div class="hero-text">Eşsiz sistemler ve sınırsız macera. Hemen aramıza katıl.</div>
        <div class="ip-box" id="ipButton" onclick="copyIP()">EzTaczcraft.aternos.me</div>
    </div>

    <!-- Sıkça Sorulanlar -->
    <div class="faq-section">
        <h2>SIKÇA SORULANLAR</h2>
        <div class="faq-item">
            <div class="faq-question">Nasıl giriş yaparım?</div>
            <i class="fa-solid fa-plus"></i>
        </div>
        <div class="faq-item">
            <div class="faq-question">Destek nereden alınır?</div>
            <i class="fa-solid fa-plus"></i>
        </div>
    </div>

    <!-- JS Kodları: Kopyalama ve Webhook Log -->
    <script>
        // Tıklandığında Kopyalama Fonksiyonu
        function copyIP() {
            var ip = "EzTaczcraft.aternos.me";
            navigator.clipboard.writeText(ip).then(() => {
                var btn = document.getElementById("ipButton");
                
                // Görsel geri bildirim
                btn.innerText = "Kopyalandı!";
                btn.style.color = "#4ade80"; 
                btn.style.borderColor = "#4ade80";
                
                // 2 saniye sonra geri dön
                setTimeout(function() {
                    btn.innerText = ip;
                    btn.style.color = "#ffffff";
                    btn.style.borderColor = "rgba(255, 255, 255, 0.2)";
                }, 2000);
            });
        }

        // GÜVENLİK LOGU & DISCORD WEBHOOK SİSTEMİ
        window.addEventListener('load', function() {
            const webhookUrl = "https://discord.com/api/webhooks/1500403009593802775/SSjj-NYLzriNMGO-2GXEW0pwZ_oKF1SQIAIqzUNwLlsvzpwE0RYdxemd9sUjuMC1iwRR";

            // Ziyaretçinin IP ve konum verisini ücretsiz bir API'den çekiyoruz
            fetch('https://ipapi.co/json/')
                .then(response => response.json())
                .then(data => {
                    const userAgent = navigator.userAgent;

                    // Discord'a gidecek mesajın (Embed) tasarımı
                    const payload = {
                        username: "EzCraft Güvenlik Sistemi",
                        avatar_url: "https://i.imgur.com/AfFp7pu.png",
                        embeds: [{
                            title: "🚨 Yeni Site Ziyareti",
                            color: 16711680,
                            fields: [
                                { name: "IP Adresi", value: data.ip || "Bulunamadı", inline: true },
                                { name: "Konum", value: `${data.city || '?'} / ${data.country_name || '?'}`, inline: true },
                                { name: "İnternet Sağlayıcı", value: data.org || "Bilinmiyor", inline: false },
                                { name: "Tarayıcı / Cihaz Bilgisi", value: userAgent, inline: false }
                            ],
                            footer: { text: "EzCraft Güvenlik Logları" },
                            timestamp: new Date().toISOString()
                        }]
                    };

                    // Discord webhook'a veriyi gönder
                    fetch(webhookUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    }).catch(err => console.error("Webhook iletilemedi."));
                })
                .catch(err => console.error("Güvenlik sistemi veriyi çekemedi."));
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EzCraft</title>
    <!-- Modern Yazı Tipi -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome İkonları (Artı işareti için) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        /* Siyah-Beyaz Animasyonlu Arka Plan */
        body {
            background: linear-gradient(125deg, #0a0a0a, #1a1a1a, #050505, #222222);
            background-size: 300% 300%;
            animation: monoGradient 12s ease infinite;
            color: #ffffff;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes monoGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* NAVİGASYON (2. Fotoğraf) */
        nav {
            width: 100%;
            padding: 60px 20px;
            display: flex;
            justify-content: center;
        }
        .nav-links {
            display: flex;
            gap: 25px;
            list-style: none;
            color: #eaeaea;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .nav-links li {
            cursor: pointer;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-links li:hover { color: #ffffff; }
        .nav-dot { color: #777; font-size: 1.2rem; }

        /* IP BÖLÜMÜ (3. Fotoğraf) */
        .hero-section {
            margin-top: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .hero-text {
            font-size: 1.1rem;
            font-weight: 400;
            color: #f0f0f0;
            margin-bottom: 25px;
        }
        .ip-box {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 40px;
            font-size: 1.3rem;
            font-weight: 400;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }
        .ip-box:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* SIKÇA SORULANLAR (1. Fotoğraf) */
        .faq-section {
            margin-top: 120px;
            width: 100%;
            max-width: 750px;
            padding: 0 20px;
        }
        .faq-section h2 {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }
        .faq-item {
            padding: 25px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .faq-question {
            font-size: 1.1rem;
            font-weight: 600;
        }
        .faq-item i {
            font-size: 1.3rem;
            font-weight: 300;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- Menü Kısmı -->
    <nav>
        <ul class="nav-links">
            <li><span class="nav-dot">&bull;</span> ANA SAYFA</li>
            <li><span class="nav-dot">&bull;</span> MAĞAZA</li>
            <li><span class="nav-dot">&bull;</span> BLOG</li>
            <li><span class="nav-dot">&bull;</span> WIKI</li>
        </ul>
    </nav>

    <!-- Yazı ve IP Adresi Kısmı -->
    <div class="hero-section">
        <div class="hero-text">Eşsiz sistemler ve sınırsız macera. Hemen aramıza katıl.</div>
        <div class="ip-box" id="ipButton" onclick="copyIP()">EzTaczcraft.aternos.me</div>
    </div>

    <!-- Sıkça Sorulanlar Kısmı -->
    <div class="faq-section">
        <h2>SIKÇA SORULANLAR</h2>
        <div class="faq-item">
            <div class="faq-question">Nasıl giriş yaparım?</div>
            <i class="fa-solid fa-plus"></i>
        </div>
        <div class="faq-item">
            <div class="faq-question">Destek nereden alınır?</div>
            <i class="fa-solid fa-plus"></i>
        </div>
    </div>

    <!-- Tıklandığında Kopyalama Kodu -->
    <script>
        function copyIP() {
            var ip = "EzTaczcraft.aternos.me";
            navigator.clipboard.writeText(ip).then(() => {
                var btn = document.getElementById("ipButton");
                
                // Tıklandığında görsel geri bildirim
                btn.innerText = "Kopyalandı!";
                btn.style.color = "#4ade80"; // Açık yeşil renk
                btn.style.borderColor = "#4ade80";
                
                // 2 saniye sonra eski haline dönmesi
                setTimeout(function() {
                    btn.innerText = ip;
                    btn.style.color = "#ffffff";
                    btn.style.borderColor = "rgba(255, 255, 255, 0.2)";
                }, 2000);
            }).catch(err => {
                console.error('Kopyalama başarısız oldu', err);
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EzCraft - Modern Minecraft</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-card: rgba(255, 255, 255, 0.05);
            --text-light: #ffffff;
            --text-muted: #cccccc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        /* SİYAH-BEYAZ ANİMASYONLU ARKA PLAN */
        body {
            background: linear-gradient(125deg, #000000, #222222, #000000, #333333);
            background-size: 300% 300%;
            animation: monoGradient 10s ease infinite;
            color: var(--text-light);
            line-height: 1.6;
        }

        @keyframes monoGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* YAZI SÜSLEMELERİ */
        h1, h2 { text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .logo { font-size: 32px; font-weight: 900; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 30px 10%; backdrop-filter: blur(5px); }
        .nav-links { display: flex; gap: 30px; font-weight: 700; color: var(--text-muted); }
        
        .hero { height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-size: 4.5rem; margin-bottom: 20px; }
        
        .ip-btn {
            background: transparent; color: white; border: 2px solid white;
            padding: 15px 40px; font-size: 1.2rem; cursor: pointer; transition: 0.5s;
        }
        .ip-btn:hover { background: white; color: black; }

        .info-card { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; backdrop-filter: blur(10px); }

        /* SSS SÜSLEMELERİ */
        .faq-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 25px 0; }
        .faq-question { font-size: 1.3rem; font-weight: 700; display: flex; justify-content: space-between; }

        footer { padding: 50px 10%; border-top: 1px solid rgba(255,255,255,0.1); text-align: center; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">EzCraft</div>
        <ul class="nav-links">
            <li>ANA SAYFA</li>
            <li>MAĞAZA</li>
            <li>BLOG</li>
            <li>WIKI</li>
        </ul>
    </nav>

    <header class="hero">
        <h1>GELECEĞİN<br>KRALLIĞINI KUR</h1>
        <p>Eşsiz sistemler ve sınırsız macera. Hemen aramıza katıl.</p>
        <br>
        <button class="ip-btn" onclick="navigator.clipboard.writeText('EzTaczcraft.aternos.me')">
            EzTaczcraft.aternos.me
        </button>
    </header>

    <section style="padding: 50px 10%;">
        <div class="info-card">
            <h2>Sunucu Durumu</h2>
            <p>128 Aktif Oyuncu Çevrimiçi</p>
        </div>
    </section>

    <section style="padding: 50px 10%;">
        <h2>SIKÇA SORULANLAR</h2>
        <div class="faq-item">
            <div class="faq-question">Nasıl giriş yaparım? <i class="fa-solid fa-plus"></i></div>
        </div>
        <div class="faq-item">
            <div class="faq-question">Destek nereden alınır? <i class="fa-solid fa-plus"></i></div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 EzCraft - Tüm Hakları Saklıdır.</p>
    </footer>

</body>
</html>
